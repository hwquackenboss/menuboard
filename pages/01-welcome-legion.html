<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
  }

  body {
    background: #1a1a2e;
  }

  /* Deep navy/burgundy gradient */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(0,30,80,0.4) 0%, transparent 60%),
      linear-gradient(160deg, #0d1b2e 0%, #1a1a2e 50%, #0d0d1a 100%);
  }

  /* Stars */
  .stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 72%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 28% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);
  }

  /* Top and bottom banner stripes */
  .stripe-top, .stripe-bottom {
    position: absolute;
    left: 0; right: 0;
    height: 10px;
  }
  .stripe-top {
    top: 0;
    background: linear-gradient(90deg, #8b0000, #cc0000, #8b0000);
  }
  .stripe-bottom {
    bottom: 0;
    background: linear-gradient(90deg, #8b0000, #cc0000, #8b0000);
  }

  /* Thin gold lines just inside the stripes */
  .stripe-top::after, .stripe-bottom::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin-top: 2px;
  }
  .stripe-bottom::after {
    margin-top: -4px;
  }

  /* Vertical side accents */
  .side-left, .side-right {
    position: absolute;
    top: 10px; bottom: 10px;
    width: 4px;
    background: linear-gradient(180deg, transparent, rgba(201,168,76,0.4), transparent);
  }
  .side-left  { left: 4vw; }
  .side-right { right: 4vw; }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8vh 8vw;
    gap: 0;
  }

  .post-number {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.65rem, 1.3vw, 1rem);
    letter-spacing: 0.6em;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 3vh;
    opacity: 0;
    animation: rise 0.7s ease forwards 0.2s;
  }

  /* Decorative divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1.5vw;
    margin-bottom: 3.5vh;
    opacity: 0;
    animation: rise 0.7s ease forwards 0.35s;
  }
  .divider-line {
    width: 8vw;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c);
  }
  .divider-line.right {
    background: linear-gradient(90deg, #c9a84c, transparent);
  }
  .divider-star {
    color: #c9a84c;
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
  }

  h1 {
    font-size: clamp(2.2rem, 6.5vw, 6.5rem);
    color: #f0e6cc;
    line-height: 1.1;
    font-weight: normal;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 40px rgba(0,0,0,0.8), 0 0 80px rgba(139,0,0,0.3);
    margin-bottom: 4vh;
    opacity: 0;
    animation: rise 0.9s ease forwards 0.5s;
  }

  h1 span {
    display: block;
    color: #c9a84c;
    font-size: 0.6em;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.3em;
  }

  .divider2 {
    display: flex;
    align-items: center;
    gap: 1.5vw;
    margin-bottom: 4vh;
    opacity: 0;
    animation: rise 0.7s ease forwards 0.75s;
  }
  .divider2 .divider-line {
    width: 5vw;
  }

  .taglines {
    display: flex;
    gap: 5vw;
    opacity: 0;
    animation: rise 0.7s ease forwards 1s;
  }

  .tagline {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.7rem, 1.4vw, 1.05rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(240,230,204,0.5);
  }

  .tagline-sep {
    color: rgba(201,168,76,0.4);
    font-size: clamp(0.7rem, 1.4vw, 1.05rem);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="stars"></div>
  <div class="stripe-top"></div>
  <div class="stripe-bottom"></div>
  <div class="side-left"></div>
  <div class="side-right"></div>

  <div class="content">
    <div class="post-number">American Legion &mdash; Post 259</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-star">&#9733;</div>
      <div class="divider-star">&#9733;</div>
      <div class="divider-star">&#9733;</div>
      <div class="divider-line right"></div>
    </div>

    <h1>
      <span>Welcome to the</span>
      American<br>Legion
    </h1>

    <div class="divider2">
      <div class="divider-line"></div>
      <div class="divider-star">&#9733;</div>
      <div class="divider-line right"></div>
    </div>

    <div class="taglines">
      <span class="tagline">Guests Welcome</span>
      <span class="tagline-sep">&bull;</span>
      <span class="tagline">Please Sign the Book</span>
    </div>
  </div>
</body>
</html>
