<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menuboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }

  #slideshow { position:relative; width:100vw; height:100vh; }

  .slide {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    pointer-events: none;
    border: none;
    background: #000;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Each page is sandboxed in an iframe that fills the slide */
  .slide iframe {
    width: 100%; height: 100%;
    border: none;
    background: #000;
  }

  #progress {
    position: fixed;
    bottom: 0; left: 0;
    height: 3px;
    background: rgba(255,255,255,0.45);
    width: 0%;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="slideshow">
  <div class="slide" data-page="01-welcome-legion">
    <iframe src="pages/01-welcome-legion.html" scrolling="no"></iframe>
  </div>
  <div class="slide" data-page="02-taco-tuesday">
    <iframe src="pages/02-taco-tuesday.html" scrolling="no"></iframe>
  </div>
</div>
<div id="progress"></div>

<script>
const DURATION = 30000; // ms

const slides     = document.querySelectorAll('.slide');
const progressEl = document.getElementById('progress');
let current = 0, timer;

function show(index) {
  slides.forEach(s => s.classList.remove('active'));
  current = ((index % slides.length) + slides.length) % slides.length;
  slides[current].classList.add('active');
  animateProgress();
}

function animateProgress() {
  progressEl.style.transition = 'none';
  progressEl.style.width = '0%';
  void progressEl.offsetWidth;
  progressEl.style.transition = `width ${DURATION}ms linear`;
  progressEl.style.width = '100%';
}

function next() { show(current + 1); }

function startAuto() {
  clearInterval(timer);
  timer = setInterval(next, DURATION);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { clearInterval(timer); next(); startAuto(); }
  if (e.key === 'ArrowLeft')                   { clearInterval(timer); show(current - 1); startAuto(); }
  if (e.key === 'f' || e.key === 'F')          { document.documentElement.requestFullscreen?.(); }
});

show(0);
startAuto();
</script>
</body>
</html>
